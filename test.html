<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shop Products</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }

        h1 {
            text-align: center;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            background: #f0f0f0;
            border: 2px solid black;
        }

        
        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .price {
            display: block;
            margin: 10px 0;
            font-weight: bold;
            color: green;
        }

        button {
            padding: 8px 15px;
            border: none;
            background: black;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #333;
        }

    </style>
</head>
